name: chat-bot-n8n

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-chat-bot-n8n
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-chatbot}
    volumes:
      - postgres_chat_bot_n8n:/var/lib/postgresql/data
    networks:
      - chat-bot-n8n

  redis:
    image: redis:7-alpine
    container_name: redis-chat-bot-n8n
    restart: unless-stopped
    networks:
      - chat-bot-n8n

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: evolution-chat-bot-n8n
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=false
      - SERVER_URL=http://localhost:8080
      - DEL_INSTANCE=false
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-chatbot}?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_chat_bot_n8n
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
      - CACHE_REDIS_PREFIX_KEY=evo_v3
      - CACHE_REDIS_SAVE_INSTANCES=true
      - QRCODE_LIMIT=30
      - QRCODE_COLOR=#000000
      - RABBITMQ_ENABLED=false
      - WEBSOCKET_ENABLED=false
    volumes:
      - evolution_chat_bot_n8n:/evolution/instances
    networks:
      - chat-bot-n8n

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-chat-bot-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
    volumes:
      - n8n_chat_bot_n8n:/home/node/.n8n
    networks:
      - chat-bot-n8n

volumes:
  postgres_chat_bot_n8n:
  redis_chat_bot_n8n:
  evolution_chat_bot_n8n:
  n8n_chat_bot_n8n:

networks:
  chat-bot-n8n:
    driver: bridge
